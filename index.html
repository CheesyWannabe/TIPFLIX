<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TV Show Streamer</title>
    <link href="https://fonts.googleapis.com/css2?family=Pacifico&family=Work+Sans:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary-orange: #FF6B35;
            --primary-purple: #6A4C93;
            --warm-cream: #FFF8F0;
            --dark-bg: #1A1423;
            --card-bg: #2D2635;
            --text-primary: #FFFFFF;
            --text-secondary: #B8B8D1;
            --accent-yellow: #FFD23F;
            --hover-glow: rgba(255, 107, 53, 0.2);
            --shadow-soft: 0 8px 32px rgba(0, 0, 0, 0.3);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Work Sans', sans-serif;
            background: linear-gradient(135deg, var(--dark-bg) 0%, #2D1B3D 100%);
            color: var(--text-primary);
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* Animated Background Pattern */
        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: 
                radial-gradient(circle at 20% 50%, rgba(255, 107, 53, 0.1) 0%, transparent 50%),
                radial-gradient(circle at 80% 80%, rgba(106, 76, 147, 0.1) 0%, transparent 50%);
            pointer-events: none;
            z-index: 0;
        }

        .container {
            position: relative;
            z-index: 1;
            max-width: 1400px;
            margin: 0 auto;
            padding: 20px;
        }

        /* Header */
        header {
            text-align: center;
            padding: 40px 20px;
            animation: fadeInDown 0.8s ease-out;
        }

        .logo {
            font-family: 'Pacifico', cursive;
            font-size: clamp(2.5rem, 6vw, 4.5rem);
            background: linear-gradient(135deg, var(--primary-orange) 0%, var(--accent-yellow) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            text-shadow: 0 4px 20px rgba(255, 107, 53, 0.4);
            margin-bottom: 10px;
            letter-spacing: 2px;
        }

        .tagline {
            font-size: 1.1rem;
            color: var(--text-secondary);
            font-weight: 300;
            letter-spacing: 3px;
            text-transform: uppercase;
        }

        /* Show Selector */
        .show-selector {
            display: flex;
            justify-content: center;
            gap: 15px;
            flex-wrap: wrap;
            margin: 30px 0;
            animation: fadeIn 1s ease-out 0.2s both;
        }

        .show-btn {
            background: var(--card-bg);
            border: 2px solid transparent;
            color: var(--text-secondary);
            padding: 15px 30px;
            border-radius: 12px;
            cursor: pointer;
            font-size: 1rem;
            font-weight: 600;
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
        }

        .show-btn::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255, 107, 53, 0.2), transparent);
            transition: left 0.5s ease;
        }

        .show-btn:hover::before {
            left: 100%;
        }

        .show-btn:hover {
            background: rgba(255, 107, 53, 0.1);
            border-color: var(--primary-orange);
            color: var(--text-primary);
            transform: translateY(-3px);
        }

        .show-btn.active {
            background: linear-gradient(135deg, var(--primary-orange), var(--primary-purple));
            color: var(--text-primary);
            border-color: var(--accent-yellow);
            box-shadow: 0 4px 20px rgba(255, 107, 53, 0.4);
        }

        /* Main Layout */
        .main-content {
            display: grid;
            grid-template-columns: 280px 1fr;
            gap: 30px;
            margin-top: 40px;
            animation: fadeIn 1s ease-out 0.3s both;
        }

        /* Sidebar - Season Navigation */
        .sidebar {
            background: var(--card-bg);
            border-radius: 20px;
            padding: 25px;
            box-shadow: var(--shadow-soft);
            height: fit-content;
            position: sticky;
            top: 20px;
        }

        .sidebar h2 {
            font-size: 1.3rem;
            margin-bottom: 20px;
            color: var(--accent-yellow);
            font-weight: 700;
            letter-spacing: 1px;
        }

        .season-list {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .season-btn {
            background: rgba(255, 255, 255, 0.05);
            border: 2px solid transparent;
            color: var(--text-secondary);
            padding: 15px 20px;
            border-radius: 12px;
            cursor: pointer;
            font-size: 1rem;
            font-weight: 600;
            transition: all 0.3s ease;
            text-align: left;
            position: relative;
            overflow: hidden;
        }

        .season-btn::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255, 107, 53, 0.2), transparent);
            transition: left 0.5s ease;
        }

        .season-btn:hover::before {
            left: 100%;
        }

        .season-btn:hover {
            background: rgba(255, 107, 53, 0.1);
            border-color: var(--primary-orange);
            color: var(--text-primary);
            transform: translateX(5px);
        }

        .season-btn.active {
            background: linear-gradient(135deg, var(--primary-orange), var(--primary-purple));
            color: var(--text-primary);
            border-color: var(--accent-yellow);
            box-shadow: 0 4px 20px rgba(255, 107, 53, 0.4);
        }

        /* Video Player Section */
        .video-section {
            background: var(--card-bg);
            border-radius: 20px;
            padding: 30px;
            box-shadow: var(--shadow-soft);
        }

        .player-header {
            margin-bottom: 25px;
        }

        .player-header h1 {
            font-size: 2rem;
            margin-bottom: 10px;
            background: linear-gradient(135deg, var(--text-primary), var(--text-secondary));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .player-info {
            display: flex;
            gap: 15px;
            align-items: center;
            flex-wrap: wrap;
        }

        .info-badge {
            background: rgba(255, 107, 53, 0.2);
            padding: 8px 16px;
            border-radius: 20px;
            font-size: 0.9rem;
            font-weight: 600;
            color: var(--accent-yellow);
            border: 1px solid var(--primary-orange);
        }

        /* Video Player Container */
        .video-container {
            position: relative;
            width: 100%;
            padding-bottom: 56.25%; /* 16:9 Aspect Ratio */
            background: #000;
            border-radius: 16px;
            overflow: hidden;
            box-shadow: 0 12px 48px rgba(0, 0, 0, 0.5);
            margin-bottom: 25px;
        }

        .video-container iframe {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border: none;
        }

        .loading-indicator {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            display: none;
            flex-direction: column;
            align-items: center;
            gap: 20px;
            z-index: 10;
        }

        .loading-indicator.active {
            display: flex;
        }

        .spinner {
            width: 60px;
            height: 60px;
            border: 4px solid rgba(255, 107, 53, 0.2);
            border-top-color: var(--primary-orange);
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        /* Player Controls */
        .controls {
            display: flex;
            gap: 15px;
            justify-content: center;
            margin-bottom: 30px;
        }

        .control-btn {
            background: linear-gradient(135deg, rgba(255, 107, 53, 0.8), rgba(106, 76, 147, 0.8));
            border: none;
            color: var(--text-primary);
            padding: 15px 35px;
            border-radius: 12px;
            cursor: pointer;
            font-size: 1rem;
            font-weight: 600;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(255, 107, 53, 0.3);
        }

        .control-btn:hover:not(:disabled) {
            transform: translateY(-3px);
            box-shadow: 0 6px 25px rgba(255, 107, 53, 0.5);
        }

        .control-btn:disabled {
            opacity: 0.3;
            cursor: not-allowed;
        }

        /* Episodes Grid */
        .episodes-section {
            margin-top: 30px;
        }

        .episodes-header {
            font-size: 1.5rem;
            margin-bottom: 20px;
            color: var(--accent-yellow);
            font-weight: 700;
        }

        .episodes-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 15px;
        }

        .episode-card {
            background: rgba(255, 255, 255, 0.05);
            border: 2px solid transparent;
            border-radius: 12px;
            padding: 20px;
            cursor: pointer;
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
        }

        .episode-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255, 107, 53, 0.1), transparent);
            transition: left 0.5s ease;
        }

        .episode-card:hover::before {
            left: 100%;
        }

        .episode-card:hover {
            background: rgba(255, 107, 53, 0.1);
            border-color: var(--primary-orange);
            transform: translateY(-5px);
            box-shadow: 0 8px 20px rgba(255, 107, 53, 0.3);
        }

        .episode-card.active {
            background: linear-gradient(135deg, rgba(255, 107, 53, 0.3), rgba(106, 76, 147, 0.3));
            border-color: var(--accent-yellow);
        }

        .episode-number {
            font-size: 0.9rem;
            color: var(--accent-yellow);
            font-weight: 700;
            margin-bottom: 8px;
        }

        .episode-title {
            font-size: 1rem;
            color: var(--text-primary);
            font-weight: 400;
            line-height: 1.4;
        }

        /* Toast Notification */
        .toast {
            position: fixed;
            bottom: 30px;
            right: 30px;
            background: linear-gradient(135deg, var(--primary-orange), var(--primary-purple));
            color: var(--text-primary);
            padding: 15px 25px;
            border-radius: 12px;
            box-shadow: var(--shadow-soft);
            opacity: 0;
            transform: translateY(20px);
            transition: all 0.3s ease;
            z-index: 1000;
            font-weight: 600;
        }

        .toast.show {
            opacity: 1;
            transform: translateY(0);
        }

        /* Animations */
        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes fadeInDown {
            from {
                opacity: 0;
                transform: translateY(-30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* Responsive Design */
        @media (max-width: 1024px) {
            .main-content {
                grid-template-columns: 1fr;
            }

            .sidebar {
                position: static;
            }

            .season-list {
                flex-direction: row;
                flex-wrap: wrap;
            }

            .season-btn {
                flex: 1;
                min-width: 120px;
            }
        }

        @media (max-width: 768px) {
            .show-selector {
                flex-direction: column;
            }

            .show-btn {
                width: 100%;
            }

            .episodes-grid {
                grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
            }

            .controls {
                flex-direction: column;
            }

            .control-btn {
                width: 100%;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1 class="logo" id="showTitle">TV Shows</h1>
            <p class="tagline">Stream Your Favorite Shows</p>
        </header>

        <!-- Show Selector -->
        <div class="show-selector">
            <button class="show-btn active" onclick="selectShow('friends')">Friends</button>
            <button class="show-btn" onclick="selectShow('modern-family')">Modern Family</button>
            <button class="show-btn" onclick="selectShow('2-broke-girls')">2 Broke Girls</button>
            <button class="show-btn" onclick="selectShow('himym')">How I Met Your Mother</button>
        </div>

        <div class="main-content">
            <!-- Sidebar: Season Navigation -->
            <aside class="sidebar">
                <h2>Seasons</h2>
                <div class="season-list" id="seasonList">
                    <!-- Season buttons will be dynamically generated -->
                </div>
            </aside>

            <!-- Main Content: Video Player -->
            <main class="video-section">
                <div class="player-header">
                    <h1 id="episodeTitle">Select an episode to start</h1>
                    <div class="player-info">
                        <span class="info-badge" id="seasonBadge">Season -</span>
                        <span class="info-badge" id="episodeBadge">Episode -</span>
                    </div>
                </div>

                <!-- Video Player -->
                <div class="video-container" id="videoContainer">
                    <div class="loading-indicator" id="loadingIndicator">
                        <div class="spinner"></div>
                        <p style="color: var(--text-secondary); font-weight: 600;">Loading episode...</p>
                    </div>
                    <iframe 
                        id="videoPlayer"
                        allowfullscreen
                        allow="autoplay; fullscreen; picture-in-picture"
                    ></iframe>
                </div>

                <!-- Controls -->
                <div class="controls">
                    <button class="control-btn" id="prevBtn">← Previous</button>
                    <button class="control-btn" id="nextBtn">Next →</button>
                </div>

                <!-- Episodes Grid -->
                <div class="episodes-section">
                    <h2 class="episodes-header" id="episodesHeader">Select a season</h2>
                    <div class="episodes-grid" id="episodesGrid">
                        <!-- Episode cards will be dynamically generated -->
                    </div>
                </div>
            </main>
        </div>
    </div>

    <!-- Toast Notification -->
    <div class="toast" id="toast"></div>

    <script>
        // Show data configuration
        const showsData = {
            'friends': {
                name: 'Friends',
                imdb: 'tt0108778',
                seasons: 10,
                episodesPerSeason: {
                    1: 24, 2: 24, 3: 25, 4: 24, 5: 24,
                    6: 25, 7: 24, 8: 24, 9: 24, 10: 18
                }
            },
            'modern-family': {
                name: 'Modern Family',
                imdb: 'tt1442437',
                seasons: 11,
                episodesPerSeason: {
                    1: 24, 2: 24, 3: 24, 4: 24, 5: 24,
                    6: 24, 7: 22, 8: 22, 9: 22, 10: 22, 11: 18
                }
            },
            '2-broke-girls': {
                name: '2 Broke Girls',
                imdb: 'tt1845307',
                seasons: 6,
                episodesPerSeason: {
                    1: 24, 2: 24, 3: 24, 4: 22, 5: 22, 6: 22
                }
            },
            'himym': {
                name: 'How I Met Your Mother',
                imdb: 'tt0460649',
                seasons: 9,
                episodesPerSeason: {
                    1: 22, 2: 22, 3: 20, 4: 24, 5: 24,
                    6: 24, 7: 24, 8: 24, 9: 24
                }
            }
        };

        // State management
        let currentShow = 'friends';
        let currentSeason = null;
        let currentEpisode = null;

        // DOM Elements
        const showTitle = document.getElementById('showTitle');
        const seasonList = document.getElementById('seasonList');
        const episodesGrid = document.getElementById('episodesGrid');
        const videoPlayer = document.getElementById('videoPlayer');
        const episodeTitle = document.getElementById('episodeTitle');
        const seasonBadge = document.getElementById('seasonBadge');
        const episodeBadge = document.getElementById('episodeBadge');
        const prevBtn = document.getElementById('prevBtn');
        const nextBtn = document.getElementById('nextBtn');
        const episodesHeader = document.getElementById('episodesHeader');
        const loadingIndicator = document.getElementById('loadingIndicator');
        const toast = document.getElementById('toast');

        // Initialize the app
        function init() {
            loadLastWatched();
        }

        // Select a show
        function selectShow(showKey) {
            currentShow = showKey;
            const show = showsData[showKey];
            
            // Update show title
            showTitle.textContent = show.name;
            
            // Update active show button
            const showButtons = document.querySelectorAll('.show-btn');
            showButtons.forEach(btn => {
                btn.classList.remove('active');
            });
            event.target.classList.add('active');
            
            // Render seasons for this show
            renderSeasons();
            
            // Load last watched for this show or start from S1E1
            const saved = localStorage.getItem(`${currentShow}_last_watched`);
            if (saved) {
                const { season, episode } = JSON.parse(saved);
                selectSeason(season);
                playEpisode(season, episode);
            } else {
                selectSeason(1);
                playEpisode(1, 1);
            }
        }

        // Render season buttons
        function renderSeasons() {
            const show = showsData[currentShow];
            seasonList.innerHTML = '';
            for (let season = 1; season <= show.seasons; season++) {
                const btn = document.createElement('button');
                btn.className = 'season-btn';
                btn.textContent = `Season ${season}`;
                btn.onclick = () => selectSeason(season);
                seasonList.appendChild(btn);
            }
        }

        // Select a season
        function selectSeason(season) {
            currentSeason = season;
            renderEpisodes(season);
            updateSeasonButtons();
            episodesHeader.textContent = `Season ${season} Episodes`;
            
            // Auto-play first episode if none selected
            const show = showsData[currentShow];
            if (!currentEpisode || currentEpisode > show.episodesPerSeason[season]) {
                playEpisode(season, 1);
            }
        }

        // Update active season button
        function updateSeasonButtons() {
            const buttons = seasonList.querySelectorAll('.season-btn');
            buttons.forEach((btn, index) => {
                btn.classList.toggle('active', index + 1 === currentSeason);
            });
        }

        // Render episodes grid
        function renderEpisodes(season) {
            const show = showsData[currentShow];
            episodesGrid.innerHTML = '';
            const episodeCount = show.episodesPerSeason[season];
            
            for (let ep = 1; ep <= episodeCount; ep++) {
                const card = document.createElement('div');
                card.className = 'episode-card';
                card.innerHTML = `
                    <div class="episode-number">Episode ${ep}</div>
                    <div class="episode-title">S${season}E${ep}</div>
                `;
                card.onclick = () => playEpisode(season, ep);
                episodesGrid.appendChild(card);
            }
            
            updateEpisodeCards();
        }

        // Update active episode card
        function updateEpisodeCards() {
            const cards = episodesGrid.querySelectorAll('.episode-card');
            cards.forEach((card, index) => {
                card.classList.toggle('active', index + 1 === currentEpisode);
            });
        }

        // Play episode
        function playEpisode(season, episode) {
            currentSeason = season;
            currentEpisode = episode;
            
            const show = showsData[currentShow];
            
            // Show loading indicator
            showLoading();
            
            // Update UI
            episodeTitle.textContent = `${show.name} - S${season}E${episode}`;
            seasonBadge.textContent = `Season ${season}`;
            episodeBadge.textContent = `Episode ${episode}`;
            
            // Update video player with vsembed.ru source
            const embedUrl = `https://vsembed.ru/embed/tv?imdb=${show.imdb}&season=${season}&episode=${episode}`;
            videoPlayer.src = embedUrl;
            
            // Update buttons
            updateControls();
            updateEpisodeCards();
            updateSeasonButtons();
            
            // Save to local storage
            saveLastWatched(season, episode);
            
            // Hide loading after delay
            setTimeout(() => hideLoading(), 1500);
            
            // Show toast
            showToast(`Playing ${show.name} S${season}E${episode}`);
        }

        // Update control buttons
        function updateControls() {
            const show = showsData[currentShow];
            
            // Previous button
            const hasPrevious = currentEpisode > 1 || currentSeason > 1;
            prevBtn.disabled = !hasPrevious;
            
            // Next button
            const hasNext = currentEpisode < show.episodesPerSeason[currentSeason] || currentSeason < show.seasons;
            nextBtn.disabled = !hasNext;
        }

        // Previous episode
        function previousEpisode() {
            const show = showsData[currentShow];
            if (currentEpisode > 1) {
                playEpisode(currentSeason, currentEpisode - 1);
            } else if (currentSeason > 1) {
                const prevSeason = currentSeason - 1;
                const lastEpisode = show.episodesPerSeason[prevSeason];
                selectSeason(prevSeason);
                playEpisode(prevSeason, lastEpisode);
            }
        }

        // Next episode
        function nextEpisode() {
            const show = showsData[currentShow];
            if (currentEpisode < show.episodesPerSeason[currentSeason]) {
                playEpisode(currentSeason, currentEpisode + 1);
            } else if (currentSeason < show.seasons) {
                selectSeason(currentSeason + 1);
                playEpisode(currentSeason + 1, 1);
            }
        }

        // Local Storage functions
        function saveLastWatched(season, episode) {
            localStorage.setItem(`${currentShow}_last_watched`, JSON.stringify({ season, episode }));
        }

        function loadLastWatched() {
            // Check if we have a saved show preference
            const savedShow = localStorage.getItem('current_show');
            if (savedShow && showsData[savedShow]) {
                currentShow = savedShow;
                
                // Update active button
                const showButtons = document.querySelectorAll('.show-btn');
                showButtons.forEach(btn => {
                    btn.classList.remove('active');
                    if (btn.textContent.toLowerCase().includes(showsData[savedShow].name.toLowerCase().split(' ')[0])) {
                        btn.classList.add('active');
                    }
                });
            }
            
            const show = showsData[currentShow];
            showTitle.textContent = show.name;
            renderSeasons();
            
            // Load last watched episode for current show
            const saved = localStorage.getItem(`${currentShow}_last_watched`);
            if (saved) {
                const { season, episode } = JSON.parse(saved);
                selectSeason(season);
                playEpisode(season, episode);
            } else {
                // Default to Season 1, Episode 1
                selectSeason(1);
                playEpisode(1, 1);
            }
        }

        // Loading indicator
        function showLoading() {
            loadingIndicator.classList.add('active');
        }

        function hideLoading() {
            loadingIndicator.classList.remove('active');
        }

        // Toast notification
        function showToast(message) {
            toast.textContent = message;
            toast.classList.add('show');
            setTimeout(() => {
                toast.classList.remove('show');
            }, 3000);
        }

        // Event listeners
        prevBtn.addEventListener('click', previousEpisode);
        nextBtn.addEventListener('click', nextEpisode);

        // Keyboard shortcuts
        document.addEventListener('keydown', (e) => {
            if (e.key === 'ArrowLeft' && !prevBtn.disabled) {
                previousEpisode();
            } else if (e.key === 'ArrowRight' && !nextBtn.disabled) {
                nextEpisode();
            }
        });

        // Double-tap/click functionality for skip forward/backward
        let lastTap = { time: 0, side: null };
        const videoContainer = document.getElementById('videoContainer');

        videoContainer.addEventListener('click', (e) => {
            const rect = videoContainer.getBoundingClientRect();
            const clickX = e.clientX - rect.left;
            const containerWidth = rect.width;
            const side = clickX < containerWidth / 2 ? 'left' : 'right';
            
            const now = Date.now();
            const timeDiff = now - lastTap.time;
            
            if (timeDiff < 300 && lastTap.side === side) {
                // Double tap detected
                if (side === 'left') {
                    showToast('⏪ Skip back 10s');
                } else {
                    showToast('⏩ Skip forward 10s');
                }
                
                lastTap = { time: 0, side: null };
            } else {
                lastTap = { time: now, side: side };
            }
        });

        // Save current show when changing
        const originalSelectShow = selectShow;
        selectShow = function(showKey) {
            localStorage.setItem('current_show', showKey);
            originalSelectShow(showKey);
        };

        // Initialize on load
        init();
    </script>
</body>
</html>
